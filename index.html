<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>光学探索 · 封面</title>
    <link rel="stylesheet" href="./src/styles/app.css" />
  </head>
  <body data-page="cover">
    <main class="cover-page">
      <section class="cover-content">
        <p class="eyebrow">几何光学 · 模拟眼实验</p>
        <h1 class="cover-title">光学探索</h1>
        <p class="cover-subtitle">从折射定律到人眼成像，在浅色精密实验环境中完成屈光不正与矫正的交互式研究。</p>
        <div class="actions">
          <a class="button primary" href="./course.html">开始探索</a>
          <a class="button" href="./experiment.html">直接进入实验</a>
        </div>
      </section>
      <section class="cover-visual" aria-label="光路示意动画">
        <canvas class="cover-canvas" id="coverCanvas"></canvas>
        <div class="cover-note">
          <span>平行光 · 透镜 · 焦点</span>
          <span>调节光路，观察像的位置变化</span>
        </div>
      </section>
    </main>

    <script>
      (() => {
        const canvas = document.getElementById("coverCanvas");
        const ctx = canvas.getContext("2d");
        let animationId = 0;

        function resize() {
          const rect = canvas.getBoundingClientRect();
          canvas.width = Math.max(1, Math.floor(rect.width * window.devicePixelRatio));
          canvas.height = Math.max(1, Math.floor(rect.height * window.devicePixelRatio));
          ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
        }

        function draw(time = 0) {
          const w = canvas.clientWidth;
          const h = canvas.clientHeight;
          const cx = w * 0.46;
          const cy = h * 0.48;
          const pulse = Math.sin(time * 0.0016) * 10;
          ctx.clearRect(0, 0, w, h);

          ctx.strokeStyle = "rgba(55, 107, 143, 0.12)";
          ctx.lineWidth = 1;
          for (let x = 24; x < w; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, h);
            ctx.stroke();
          }
          for (let y = 24; y < h; y += 40) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(w, y);
            ctx.stroke();
          }

          ctx.strokeStyle = "#1687a7";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.ellipse(cx, cy, 24, 116, 0, 0, Math.PI * 2);
          ctx.stroke();

          const focusX = cx + 160 + pulse;
          [-72, -36, 0, 36, 72].forEach((offset, index) => {
            const startX = 34;
            const startY = cy + offset;
            ctx.strokeStyle = index === 2 ? "rgba(22, 135, 167, 0.92)" : "rgba(184, 123, 30, 0.78)";
            ctx.lineWidth = index === 2 ? 2.4 : 1.8;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(cx, startY * 0.92 + cy * 0.08);
            ctx.lineTo(focusX, cy);
            ctx.lineTo(w - 34, cy - offset * 0.34);
            ctx.stroke();
          });

          ctx.fillStyle = "#b87b1e";
          ctx.beginPath();
          ctx.arc(focusX, cy, 5, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#162532";
          ctx.font = "700 16px Microsoft YaHei, sans-serif";
          ctx.fillText("f", focusX - 4, cy + 28);
          ctx.fillText("模拟眼光路", 28, 34);

          animationId = requestAnimationFrame(draw);
        }

        window.addEventListener("resize", resize);
        resize();
        draw();
        window.addEventListener("pagehide", () => cancelAnimationFrame(animationId));
      })();
    </script>
  </body>
</html>
